<!DOCTYPE html>
<html>
<head>
    <title>DermaCare - Upload Image</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f6ff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 400px;
            background: white;
            border-radius: 18px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2a2d3a;
        }
        select, input[type="file"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #2b3a8a;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
        }
        .note {
            margin-top: 15px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Upload Your Skin Image</div>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <select name="category" required>
                <option value="" disabled selected>Select Category</option>
                <option value="acne">Acne</option>
                <option value="pigmentation">Pigmentation</option>
                <option value="melanoma">Melanoma</option>
            </select>
            <button type="submit">Analyze</button>
        </form>
        <div class="note">Please upload a clear image for accurate results.</div>
    </div>
</body>
</html>
